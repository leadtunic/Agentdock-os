name: Bug report
description: Report a reproducible bug in AgentDock OS
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - API
        - Agent Runtime
        - Browser Runtime
        - Visual Toolbar
        - Memory Engine
        - Skills Engine
        - MCP Hub
        - Message Gateway
        - Git Workspace
        - Quality Gate
        - Deployment
        - Documentation
        - Other
    validations:
      required: true
