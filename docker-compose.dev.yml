services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentdock
      POSTGRES_PASSWORD: agentdock
      POSTGRES_DB: agentdock
    ports:
      - "5432:5432"
    volumes:
      - agentdock_postgres_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - agentdock_redis_dev:/data

volumes:
  agentdock_postgres_dev:
  agentdock_redis_dev:
